<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Olu Streets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameShell">
    <header class="topbar">
      <div class="brand"><span class="logo">O</span><span>Olu Streets</span><small>on foot</small></div>
      <div class="hud">
        <div><span>Cash</span><strong id="cash">$0</strong></div>
        <div><span>Heat</span><strong id="heat">0</strong></div>
        <div><span>Rep</span><strong id="rep">0</strong></div>
        <div><span>Lives</span><strong id="lives">5</strong></div>
      </div>
    </header>

    <main>
      <canvas id="game" width="960" height="620" tabindex="0" aria-label="Top-down city game canvas"></canvas>
      <aside class="panel">
        <section class="card intro" id="intro">
          <button class="close" id="closeIntro">×</button>
          <h1>Welcome to Olu City</h1>
          <p>Reach the glowing marker to start your first mission.</p>
          <button id="startBtn">Start Game</button>
        </section>
        <section class="card objective">
          <div class="cardTitle">Objective <button class="close" id="nextJob">×</button></div>
          <p id="objectiveText">Find the glowing marker near the studio.</p>
        </section>
        <section class="card controls">
          <div class="cardTitle">Controls</div>
          <p><kbd>WASD</kbd> / <kbd>Arrows</kbd> move / drive</p>
          <p><kbd>Shift</kbd> sprint / boost</p>
          <p><kbd>E</kbd> enter vehicle / interact</p>
          <p><kbd>Space</kbd> handbrake</p>
          <p><kbd>M</kbd> next mission</p>
        </section>
      </aside>
      <div id="mobileControls" aria-label="Mobile movement controls">
        <div id="joystickBase">
          <div id="joystickStick"></div>
        </div>
        <button id="mobileAction" type="button" aria-label="Interact">E</button>
      </div>
    </main>
  </div>
  <script src="game.js"></script>
</body>
</html>
